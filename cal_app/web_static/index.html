<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cal Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <main class="shell">
      <section class="hero">
        <div class="hero-text">
          <p class="eyebrow">Schedule Studio</p>
          <h1>cal 前端控制台</h1>
          <p class="subtitle">创建任务、更新状态、清理逾期，一页完成。</p>
        </div>
        <div class="hero-metrics">
          <article class="metric-card">
            <span class="label">Today</span>
            <strong id="todayValue">-</strong>
          </article>
          <article class="metric-card">
            <span class="label">Tasks</span>
            <strong id="taskCount">0</strong>
          </article>
          <article class="metric-card">
            <span class="label">Schedules</span>
            <strong id="scheduleCount">0</strong>
          </article>
          <article class="metric-card">
            <span class="label">Overdue</span>
            <strong id="overdueCount">0</strong>
          </article>
        </div>
      </section>

      <section class="panel">
        <div class="table-head">
          <h2>日程列表</h2>
          <div class="filters">
            <select id="statusFilter">
              <option value="todo">todo</option>
              <option value="active">todo+doing</option>
              <option value="all">all</option>
            </select>
            <input id="fromDateFilter" type="date" />
            <input id="toDateFilter" type="date" />
            <input id="searchFilter" placeholder="按任务名或 ID 搜索" />
          </div>
        </div>

        <div class="table-toolbar">
          <div class="inline-actions">
            <button id="selectVisibleBtn" type="button" class="mini-btn">全选当前结果</button>
            <button id="clearSelectedBtn" type="button" class="mini-btn">清空选择</button>
            <button id="markSelectedDoneBtn" type="button" class="mini-btn danger">选中设为 done</button>
          </div>
          <span id="selectedCount" class="muted">已选 0 项</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th><input id="selectAllToggle" type="checkbox" /></th>
                <th>Task</th>
                <th>Name</th>
                <th>Date</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="table-head">
          <h2>历史未完成</h2>
          <span class="muted">结束日期早于今天且状态非 done</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Task</th>
                <th>Name</th>
                <th>Date</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="overdueBody"></tbody>
          </table>
        </div>
        <p id="overdueEmpty" class="muted hidden">暂无历史未完成项</p>
      </section>

      <section class="panel">
        <div class="table-head">
          <h2>任务修改</h2>
          <span class="muted">从日程列表点击“编辑任务”可直接跳转到这里</span>
        </div>
        <form id="taskEditForm" class="task-edit hidden">
          <h3 id="taskEditTitle">编辑任务</h3>
          <input type="hidden" id="editTaskId" />
          <input type="hidden" id="editTaskKind" />
          <div class="task-edit-grid">
            <input id="editName" placeholder="任务名称" required />
            <input id="editDescription" placeholder="描述（可选）" />
          </div>

          <div id="editOneTimeFields" class="task-edit-grid hidden">
            <input id="editStartDate" type="date" />
            <input id="editEndDate" type="date" />
          </div>

          <div id="editRecurringFields" class="task-edit-grid hidden">
            <input id="editFirstStartDate" type="date" />
            <input id="editFirstEndDate" type="date" />
            <input id="editTaskStartDate" type="date" />
            <input id="editTaskEndDate" type="date" />
            <select id="editRepeatUnit">
              <option value="day">day</option>
              <option value="week">week</option>
              <option value="month">month</option>
              <option value="year">year</option>
            </select>
            <input id="editN" type="number" min="1" />
          </div>

          <div class="inline-actions">
            <button type="submit" class="mini-btn">保存修改</button>
            <button id="cancelTaskEditBtn" type="button" class="mini-btn">取消</button>
          </div>
        </form>
      </section>

      <section class="panel actions">
        <h2>快捷操作</h2>
        <div class="action-row">
          <button data-action="maintenance">强制维护</button>
          <button data-action="done-overdue">逾期标记 done</button>
          <button data-action="delay-overdue">逾期一次性任务延期到今天</button>
        </div>
      </section>

      <section class="panel-grid">
        <article class="panel">
          <h2>一次性任务</h2>
          <form id="oneTimeForm" class="form-stack">
            <input name="name" placeholder="任务名称" required />
            <textarea name="description" placeholder="描述（可选）"></textarea>
            <div class="row">
              <input name="start_date" type="date" required />
              <input name="end_date" type="date" required />
            </div>
            <label class="check">
              <input name="is_test" type="checkbox" />
              <span>测试任务</span>
            </label>
            <button type="submit">创建一次性任务</button>
          </form>
        </article>

        <article class="panel">
          <h2>周期任务</h2>
          <form id="recurringForm" class="form-stack">
            <input name="name" placeholder="任务名称" required />
            <textarea name="description" placeholder="描述（可选）"></textarea>
            <div class="row">
              <input name="first_start_date" type="date" required />
              <input name="first_end_date" type="date" required />
            </div>
            <div class="row">
              <select name="repeat_unit">
                <option value="day">每天</option>
                <option value="week">每周</option>
                <option value="month">每月</option>
                <option value="year">每年</option>
              </select>
              <input name="n" type="number" min="1" value="1" required />
            </div>
            <div class="row">
              <input name="task_start_date" type="date" />
              <input name="task_end_date" type="date" />
            </div>
            <label class="check">
              <input name="is_test" type="checkbox" />
              <span>测试任务</span>
            </label>
            <button type="submit">创建周期任务</button>
          </form>
        </article>
      </section>

      <p id="toast" class="toast"></p>
    </main>
    <script src="/app.js" defer></script>
  </body>
</html>
