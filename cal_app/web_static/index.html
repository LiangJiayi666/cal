<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cal Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=20260421" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <main class="shell">
      <section class="hero">
        <div class="hero-text">
          <p class="eyebrow">Schedule Studio</p>
          <h1>cal 前端控制台</h1>
          <p class="subtitle">创建任务、更新状态、清理逾期，一页完成。</p>
        </div>
        <div class="hero-metrics">
          <article class="metric-card">
            <span class="label">Today</span>
            <strong id="todayValue">-</strong>
          </article>
          <article class="metric-card">
            <span class="label">Tasks</span>
            <strong id="taskCount">0</strong>
          </article>
          <article class="metric-card">
            <span class="label">Schedules</span>
            <strong id="scheduleCount">0</strong>
          </article>
          <article class="metric-card">
            <span class="label">Overdue</span>
            <strong id="overdueCount">0</strong>
          </article>
        </div>
      </section>

      <section class="panel">
        <div class="table-head">
          <h2>日程列表</h2>
          <div class="filters">
            <select id="statusFilter">
              <option value="todo">todo</option>
              <option value="active">todo+doing</option>
              <option value="all">all</option>
            </select>
            <input id="fromDateFilter" type="date" />
            <input id="toDateFilter" type="date" />
            <input id="searchFilter" placeholder="按任务名或 ID 搜索" />
          </div>
        </div>

        <div class="table-toolbar">
          <div class="inline-actions">
            <button id="selectVisibleBtn" type="button" class="mini-btn">全选当前结果</button>
            <button id="clearSelectedBtn" type="button" class="mini-btn">清空选择</button>
            <button id="markSelectedDoneBtn" type="button" class="mini-btn danger">选中设为 done</button>
          </div>
          <span id="selectedCount" class="muted">已选 0 项</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th><input id="selectAllToggle" type="checkbox" /></th>
                <th>Task</th>
                <th>Name</th>
                <th>Date</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="table-head">
          <h2>历史未完成</h2>
          <span class="muted">结束日期早于今天且状态非 done</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Task</th>
                <th>Name</th>
                <th>Date</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="overdueBody"></tbody>
          </table>
        </div>
        <p id="overdueEmpty" class="muted hidden">暂无历史未完成项</p>
      </section>

      <section class="panel-grid">
        <article class="panel" id="editOneTimePanel">
          <h2>编辑一次性任务</h2>
          <form id="editOneTimeForm" class="form-stack">
            <label class="field-label" for="eoTaskId">任务编号（不可修改）</label>
            <input id="eoTaskId" readonly />
            <label class="field-label" for="eoName">任务名称</label>
            <input id="eoName" placeholder="任务名称" required />

            <label class="field-label" for="eoDescription">描述</label>
            <input id="eoDescription" placeholder="描述（可选）" />

            <div class="row">
              <div>
                <label class="field-label" for="eoStartDate">起始日期</label>
                <input id="eoStartDate" type="date" required />
              </div>
              <div>
                <label class="field-label" for="eoEndDate">结束日期</label>
                <input id="eoEndDate" type="date" required />
              </div>
            </div>

            <div class="inline-actions">
              <button type="submit" class="mini-btn">保存一次性任务</button>
              <button id="clearEditOneTimeBtn" type="button" class="mini-btn">清空</button>
            </div>
          </form>
        </article>

        <article class="panel" id="editRecurringPanel">
          <h2>编辑周期任务</h2>
          <form id="editRecurringForm" class="form-stack">
            <label class="field-label" for="erTaskId">任务编号（不可修改）</label>
            <input id="erTaskId" readonly />
            <label class="field-label" for="erName">任务名称</label>
            <input id="erName" placeholder="任务名称" required />

            <label class="field-label" for="erDescription">描述</label>
            <input id="erDescription" placeholder="描述（可选）" />

            <div class="row">
              <div>
                <label class="field-label" for="erFirstStartDate">首次起始日期</label>
                <input id="erFirstStartDate" type="date" required />
              </div>
              <div>
                <label class="field-label" for="erFirstEndDate">首次结束日期</label>
                <input id="erFirstEndDate" type="date" required />
              </div>
            </div>

            <div class="row">
              <div>
                <label class="field-label" for="erTaskStartDate">任务起始日期</label>
                <input id="erTaskStartDate" type="date" />
              </div>
              <div>
                <label class="field-label" for="erTaskEndDate">任务结束日期</label>
                <input id="erTaskEndDate" type="date" />
              </div>
            </div>

            <div class="row">
              <div>
                <label class="field-label" for="erRepeatUnit">重复单位</label>
                <select id="erRepeatUnit">
                  <option value="day">day</option>
                  <option value="week">week</option>
                  <option value="month">month</option>
                  <option value="year">year</option>
                </select>
              </div>
              <div>
                <label class="field-label" for="erN">间隔次数</label>
                <input id="erN" type="number" min="1" required />
              </div>
            </div>

            <div class="inline-actions">
              <button type="submit" class="mini-btn">保存周期任务</button>
              <button id="clearEditRecurringBtn" type="button" class="mini-btn">清空</button>
            </div>
          </form>
        </article>
      </section>

      <section class="panel actions">
        <h2>快捷操作</h2>
        <div class="action-row">
          <button data-action="maintenance">强制维护</button>
          <button data-action="done-overdue">逾期标记 done</button>
          <button data-action="delay-overdue">逾期一次性任务延期到今天</button>
        </div>
      </section>

      <section class="panel-grid">
        <article class="panel">
          <h2>一次性任务</h2>
          <form id="oneTimeForm" class="form-stack">
            <label class="field-label" for="createOneName">任务名称</label>
            <input id="createOneName" name="name" placeholder="任务名称" required />

            <label class="field-label" for="createOneDesc">描述</label>
            <textarea id="createOneDesc" name="description" placeholder="描述（可选）"></textarea>

            <div class="row">
              <div>
                <label class="field-label" for="createOneStart">起始日期</label>
                <input id="createOneStart" name="start_date" type="date" required />
              </div>
              <div>
                <label class="field-label" for="createOneEnd">结束日期</label>
                <input id="createOneEnd" name="end_date" type="date" required />
              </div>
            </div>

            <label class="check">
              <input name="is_test" type="checkbox" />
              <span>测试任务</span>
            </label>
            <button type="submit">创建一次性任务</button>
          </form>
        </article>

        <article class="panel">
          <h2>周期任务</h2>
          <form id="recurringForm" class="form-stack">
            <label class="field-label" for="createRecName">任务名称</label>
            <input id="createRecName" name="name" placeholder="任务名称" required />

            <label class="field-label" for="createRecDesc">描述</label>
            <textarea id="createRecDesc" name="description" placeholder="描述（可选）"></textarea>

            <div class="row">
              <div>
                <label class="field-label" for="createFirstStart">首次起始日期</label>
                <input id="createFirstStart" name="first_start_date" type="date" required />
              </div>
              <div>
                <label class="field-label" for="createFirstEnd">首次结束日期</label>
                <input id="createFirstEnd" name="first_end_date" type="date" required />
              </div>
            </div>

            <div class="row">
              <div>
                <label class="field-label" for="createRepeatUnit">重复单位</label>
                <select id="createRepeatUnit" name="repeat_unit">
                  <option value="day">每天</option>
                  <option value="week">每周</option>
                  <option value="month">每月</option>
                  <option value="year">每年</option>
                </select>
              </div>
              <div>
                <label class="field-label" for="createInterval">间隔次数</label>
                <input id="createInterval" name="n" type="number" min="1" value="1" required />
              </div>
            </div>

            <div class="row">
              <div>
                <label class="field-label" for="createTaskStart">任务起始日期</label>
                <input id="createTaskStart" name="task_start_date" type="date" />
              </div>
              <div>
                <label class="field-label" for="createTaskEnd">任务结束日期</label>
                <input id="createTaskEnd" name="task_end_date" type="date" />
              </div>
            </div>

            <label class="check">
              <input name="is_test" type="checkbox" />
              <span>测试任务</span>
            </label>
            <button type="submit">创建周期任务</button>
          </form>
        </article>
      </section>

      <p id="toast" class="toast"></p>
    </main>
    <script src="/app.js?v=20260421" defer></script>
  </body>
</html>
